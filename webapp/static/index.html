<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>prompt sigil</title>
<style>
  :root {
    --bg: #f5f3ec;
    --ink: #101010;
    --sub: #444;
    --mute: #888;
    --panel: #ece9dd;
    --hi: #fff5b8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
  }
  body { display: grid; grid-template-columns: 420px 1fr; height: 100vh; }
  .left {
    border-right: 1px solid #d8d4c4;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    min-height: 0;
  }
  .controls {
    padding: 12px 14px;
    border-bottom: 1px solid #d8d4c4;
    display: grid;
    gap: 8px;
  }
  .controls h1 {
    margin: 0;
    font-size: 14px;
    letter-spacing: 0.04em;
  }
  textarea {
    width: 100%;
    height: 110px;
    border: 1px solid #c8c3b1;
    background: var(--panel);
    color: var(--ink);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 8px;
    resize: vertical;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  button {
    border: 1px solid var(--ink);
    background: var(--bg);
    color: var(--ink);
    padding: 4px 10px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  button:hover { background: var(--ink); color: var(--bg); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  select, input[type="range"] { font-family: inherit; }
  .reading {
    overflow-y: auto;
    padding: 10px 14px;
    border-bottom: 1px solid #d8d4c4;
    line-height: 1.45;
    font-size: 12px;
    background: var(--bg);
    min-height: 0;
  }
  .reading .unit {
    margin: 0 0 5px 0;
    padding: 1px 4px;
    color: #bbb;
    border-left: 2px solid transparent;
    transition: color 200ms, background 200ms, border-left-color 200ms;
    word-break: break-word;
  }
  .reading .unit.read { color: var(--ink); }
  .reading .unit.now {
    background: var(--hi);
    color: var(--ink);
  }
  .reading .heading {
    font-weight: 700;
    color: var(--ink);
    border-left-color: currentColor;
    padding-left: 6px;
    margin-top: 8px;
    background: transparent !important;
  }
  .stats {
    padding: 8px 14px;
    border-top: 1px solid #d8d4c4;
    color: var(--mute);
    font-size: 11px;
    line-height: 1.4;
    background: var(--panel);
  }
  .stats b { color: var(--ink); font-weight: 600; }
  .right {
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  svg {
    width: min(100vmin, 100vh);
    height: min(100vmin, 100vh);
    display: block;
  }
  .mute { color: var(--mute); }
  .label-now {
    margin-top: 4px;
    font-size: 11px;
    color: var(--sub);
  }
  .label-now b { color: var(--ink); }

  /* live inference panel */
  .live { background: var(--panel); border-bottom: 1px solid #d8d4c4; }
  .live > summary {
    padding: 8px 14px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    list-style: none;
    user-select: none;
  }
  .live > summary::before {
    content: "▶ ";
    display: inline-block;
    transition: transform 150ms;
  }
  .live[open] > summary::before { content: "▼ "; }
  .live[open] > summary { border-bottom: 1px solid #d8d4c4; }
  .live-body { padding: 10px 14px; display: grid; gap: 8px; }
  .live select, .live input[type="text"], .live input[type="number"] {
    border: 1px solid #c8c3b1;
    background: var(--bg);
    font-family: inherit;
    font-size: 11px;
    padding: 3px 5px;
  }
  .live textarea { height: 60px; }
  .live #model-status {
    font-size: 10px;
    color: var(--mute);
    word-break: break-all;
  }
  .thought-output {
    background: #fff;
    border: 1px solid #c8c3b1;
    padding: 6px 8px;
    font-size: 11px;
    line-height: 1.5;
    max-height: 160px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 32px;
    color: #333;
  }
  .thought-output:empty::before {
    content: "(no output yet)";
    color: #aaa;
  }

  /* --- Sigil rotation (CSS so it survives WASM main-thread block) --- */
  #rotation-group {
    transform-origin: 800px 800px;
    animation: sigil-rotate 400s linear infinite;
    will-change: transform;
  }
  @keyframes sigil-rotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* --- Thinking mode: speed-up + central pulse + emanating rings --- */
  body.thinking #rotation-group {
    animation-duration: 80s;
  }
  body.thinking #seal {
    transform-origin: 800px 800px;
    animation: seal-pulse 1.6s ease-in-out infinite;
  }
  @keyframes seal-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
  }
  /* The thinking-rings circles share the same cx/cy as the seal centre and
     scale outward toward the rim (R_BOUND_OUT = 740, base r = 80 => 9.25x). */
  .thinking-ring {
    transform-origin: 800px 800px;
    opacity: 0;
  }
  body.thinking .thinking-ring {
    animation: ring-expand 3s ease-out infinite;
  }
  body.thinking .thinking-ring:nth-child(2) { animation-delay: 1s; }
  body.thinking .thinking-ring:nth-child(3) { animation-delay: 2s; }
  @keyframes ring-expand {
    0%   { transform: scale(1);    opacity: 0; }
    10%  { opacity: 0.85; }
    100% { transform: scale(9.25); opacity: 0; }
  }
  /* During thinking, the output panel hints "live" with a soft border pulse */
  body.thinking .thought-output {
    animation: thought-edge 1.6s ease-in-out infinite;
    border-color: hsl(45 80% 50%);
  }
  @keyframes thought-edge {
    0%, 100% { box-shadow: 0 0 0 0 hsla(45,80%,50%,0); }
    50%      { box-shadow: 0 0 0 3px hsla(45,80%,50%,0.25); }
  }

  /* --- Drawing mode (human draws on the sigil) --- */
  body.drawing svg {
    cursor: crosshair;
  }
  body.drawing .interpret-hint {
    background: hsl(45 80% 92%);
    border-color: hsl(45 70% 50%);
  }
  .interpret-hint {
    font-size: 11px;
    line-height: 1.4;
    padding: 6px 8px;
    background: var(--panel);
    border: 1px solid #c8c3b1;
    color: var(--ink);
    min-height: 24px;
  }
  .interpret-hint:empty::before {
    content: "(no marks yet — toggle ✎ to draw on the circle)";
    color: var(--mute);
    font-style: italic;
  }
  .draw-controls button.active {
    background: var(--ink);
    color: var(--bg);
  }
  /* Affected-section highlight: applied to a vertex element when a stroke
     marks the section. Pure CSS so it animates even during inference. */
  @keyframes affected-glow {
    0%, 100% { stroke-width: 0.9;  filter: none; }
    50%      { stroke-width: 2.2;  filter: drop-shadow(0 0 6px hsl(45 80% 50%)); }
  }
  .affected-vertex { animation: affected-glow 1.4s ease-in-out infinite; }

  /* Type-tool buttons — large glyph for tap targets */
  #type-tools button {
    font-size: 16px;
    line-height: 1;
    width: 32px;
    padding: 4px 0;
  }
</style>
</head>
<body>
  <div class="left">
    <div class="controls">
      <h1>prompt sigil</h1>
      <div class="row">
        <select id="examples">
          <option value="complex">examples / complex.md</option>
          <option value="sample">examples / sample.md</option>
          <option value="memo">memo.md</option>
          <option value="custom">(custom)</option>
        </select>
        <button id="load">load</button>
      </div>
      <textarea id="input" placeholder="paste a markdown prompt..."></textarea>
      <div class="row">
        <button id="go">conjure</button>
        <button id="restart" disabled>restart</button>
        <button id="rotate-toggle" title="pause/resume rotation">⏸</button>
        <span class="mute">spd</span>
        <input type="range" id="rotate-speed" min="0" max="100" value="40" style="width:80px" title="rotation speed">
        <span class="mute">·</span>
        <input type="range" id="speed" min="1" max="40" value="14" style="width:80px" title="conjure animation speed">
        <span id="speed-label" class="mute">14</span>
      </div>
      <div class="label-now">
        <span id="now-section" class="mute">—</span>
      </div>
    </div>

    <details class="live" id="draw-panel" open>
      <summary>draw on the sigil (talk to AI in glyphs)</summary>
      <div class="live-body">
        <div class="row draw-controls" id="type-tools">
          <button data-tool="place:persona"    title="self / role">◉</button>
          <button data-tool="place:reasoning"  title="thought style">△</button>
          <button data-tool="place:tools"      title="instruments">⊞</button>
          <button data-tool="place:output"     title="output form">◇</button>
          <button data-tool="place:style"      title="voice / style">✦</button>
          <button data-tool="place:limits"     title="constraints">▽</button>
          <button data-tool="place:memory"     title="memory / context">○</button>
          <button data-tool="place:examples"   title="examples">⌬</button>
        </div>
        <div class="row draw-controls">
          <button data-tool="bridge" title="click two vertices to bridge">↔ bridge</button>
          <button data-tool="delete" title="click a vertex to delete">× delete</button>
          <button data-tool="off" class="active" title="exit compose tools">◯ view</button>
        </div>
        <div class="row draw-controls">
          <button id="draw-toggle" title="freehand drawing (alternative to click tools)">✎ free</button>
          <button id="draw-clear" title="erase all marks">clear</button>
          <button id="draw-help" title="show vocabulary">?</button>
        </div>
        <div class="row draw-controls">
          <button id="draw-scaffold" title="generate prompt from drawing/composition">✦ scaffold</button>
          <button id="draw-blank" title="start from empty canvas">⌂ blank</button>
        </div>
        <div class="interpret-hint" id="interpret-hint"></div>
      </div>
    </details>

    <details class="live" id="live-panel">
      <summary>live inference (browser LLM)</summary>
      <div class="live-body">
        <div class="row">
          <select id="model-picker" style="flex:1">
            <option value="HuggingFaceTB/SmolLM2-135M-Instruct" selected>SmolLM2 135M (~100MB, recommended)</option>
            <option value="HuggingFaceTB/SmolLM2-360M-Instruct">SmolLM2 360M (~250MB)</option>
            <option value="onnx-community/Qwen3-0.6B-ONNX">Qwen3 0.6B (~600MB)</option>
            <option value="onnx-community/gemma-3-270m-it-ONNX">gemma-3 270M (~500MB, large vocab)</option>
            <option value="onnx-community/gemma-3-1b-it-ONNX">gemma-3 1B (~1GB)</option>
            <option value="onnx-community/gemma-4-E2B-it-ONNX">gemma-4 E2B (~1.5GB)</option>
            <option value="custom">(custom HF id...)</option>
          </select>
        </div>
        <input type="text" id="custom-model" placeholder="onnx-community/..." style="display:none">
        <div class="row">
          <button id="load-model">load model</button>
          <label style="font-size:11px;display:flex;align-items:center;gap:3px">
            <input type="checkbox" id="force-wasm" style="margin:0">force wasm
          </label>
          <select id="dtype-choice" style="font-size:11px">
            <option value="auto" selected>auto</option>
            <option value="q4">q4</option>
            <option value="q8">q8</option>
            <option value="fp16">fp16</option>
          </select>
        </div>
        <div id="model-status" style="word-break:break-all">not loaded</div>
        <textarea id="query" placeholder="ask the model something about the prompt..."></textarea>
        <div class="row">
          <button id="run-llm" disabled>infer</button>
          <button id="stop-llm" disabled>stop</button>
          <span class="mute">max</span>
          <input type="number" id="max-tokens" value="200" min="20" max="2000" style="width:60px">
          <span class="mute">tok</span>
        </div>
        <div class="thought-output" id="thought-output"></div>
      </div>
    </details>

    <div class="reading" id="reading"></div>

    <div class="stats" id="stats">
      <span class="mute">no input yet.</span>
    </div>
  </div>

  <div class="right">
    <svg id="sigil" viewBox="0 0 1600 1600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="thought-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <rect width="1600" height="1600" fill="#f5f3ec"/>
    </svg>
  </div>

<script type="module">
"use strict";

import { pipeline, TextStreamer } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.8.1";

const SVG_NS = "http://www.w3.org/2000/svg";
const SVG_SIZE = 1600;
const CX = SVG_SIZE / 2;
const CY = SVG_SIZE / 2;
const R = {
  BOUND_OUT: 740,
  BOUND_IN: 730,
  TOKEN_OUT: 720,
  TOKEN_IN: 692,
  DIV_IN: 684,
  VERTEX_OUT: 620,
  VERTEX: 560,
  CLOUD: 480,
  SEAL_OUT: 80,
  SEAL_IN: 70,
};
const INK = "#101010";
const BG = "#f5f3ec";

const DEFAULT_TEXTS = {
  memo: "# What makes humans feel awe\n- Awe at numbers\n- Awe at scale\n- Awe at speed\n- Awe at force\n- Awe at quality\n- Awe at motion\n- Reproduction of natural things\n    - Human-like dialogue or paintings\n\n# Idea\n- Build a magic circle by visualising vector representations\n",
};

class Sigil {
  constructor() {
    this.svg = document.getElementById("sigil");
    this.input = document.getElementById("input");
    this.go = document.getElementById("go");
    this.restart = document.getElementById("restart");
    this.speed = document.getElementById("speed");
    this.speedLabel = document.getElementById("speed-label");
    this.examples = document.getElementById("examples");
    this.loadBtn = document.getElementById("load");
    this.readingEl = document.getElementById("reading");
    this.statsEl = document.getElementById("stats");
    this.nowSection = document.getElementById("now-section");

    this.layout = null;
    this.layers = {};
    this.unitEls = [];
    this.sectionVertexEls = [];
    this.sectionTickAccum = [];
    this.lastDot = null;
    this.lastSectionIdx = -1;
    this.tokensSeen = 0;
    this.timer = null;
    this.lastThoughtPos = null;
    this.thoughtCount = 0;

    this.go.addEventListener("click", () => this.start());
    this.restart.addEventListener("click", () => this.start());
    this.speed.addEventListener("input", () => {
      this.speedLabel.textContent = this.speed.value;
    });
    this.loadBtn.addEventListener("click", () => this.loadExample());

    // Rotation controls
    this.rotateToggle = document.getElementById("rotate-toggle");
    this.rotateSpeed = document.getElementById("rotate-speed");
    this.rotateToggle.addEventListener("click", () => this.toggleRotation());
    this.rotateSpeed.addEventListener("input", () => this.applyRotationSpeed());

    this.loadExample();
  }

  toggleRotation() {
    if (!this.rotationGroup) return;
    const paused = this.rotationGroup.style.animationPlayState === "paused";
    this.rotationGroup.style.animationPlayState = paused ? "running" : "paused";
    // Apply to thinking-rings too so the whole figure halts together.
    if (this.layers && this.layers.thinkingRings) {
      [...this.layers.thinkingRings.children].forEach((c) => {
        c.style.animationPlayState = paused ? "running" : "paused";
      });
    }
    if (this.layers && this.layers.seal) {
      [...this.layers.seal.children].forEach((c) => {
        c.style.animationPlayState = paused ? "running" : "paused";
      });
    }
    this.rotateToggle.textContent = paused ? "⏸" : "▶";
  }

  applyRotationSpeed() {
    if (!this.rotationGroup) return;
    // Slider 0-100 → seconds per revolution. 0 means paused.
    const v = Number(this.rotateSpeed.value);
    if (v === 0) {
      this.rotationGroup.style.animationPlayState = "paused";
      this.rotateToggle.textContent = "▶";
      return;
    }
    // Inverse mapping so higher slider = faster: 100 → 60s/rev, 1 → 1200s/rev
    const seconds = Math.round(60 + (100 - v) * 11.4);
    this.rotationGroup.style.animationDuration = `${seconds}s`;
    this.rotationGroup.style.animationPlayState = "running";
    this.rotateToggle.textContent = "⏸";
  }

  async loadExample() {
    const which = this.examples.value;
    if (which === "custom") return;
    const map = {
      complex: "/files/examples/complex.md",
      sample: "/files/examples/sample.md",
      memo: "/files/memo.md",
    };
    const url = map[which];
    if (!url) {
      if (DEFAULT_TEXTS[which]) this.input.value = DEFAULT_TEXTS[which];
      return;
    }
    try {
      const resp = await fetch(url);
      if (resp.ok) {
        this.input.value = await resp.text();
      } else {
        this.input.value = DEFAULT_TEXTS[which] || "# Example\n\nPlace your prompt here.";
      }
    } catch (e) {
      this.input.value = DEFAULT_TEXTS[which] || "# Example\n\nPlace your prompt here.";
    }
  }

  async prepareLayout() {
    // Fetches /api/layout, populates state and the static frame (boundary,
    // dividers, vertex placeholders, k-NN polygon, seal). Does NOT run the
    // per-sentence reveal animation. Safe to call repeatedly; idempotent for
    // the same input text.
    if (this.timer) clearTimeout(this.timer);
    const text = this.input.value;
    if (this._lastPreparedText === text && this.layout) return true;
    this.statsEl.innerHTML = '<span class="mute">computing layout...</span>';
    let layout;
    try {
      const resp = await fetch("/api/layout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, title: this.examples.value || "prompt" }),
      });
      layout = await resp.json();
    } catch (e) {
      this.statsEl.innerHTML = `<span style="color:#a33">error: ${e.message}</span>`;
      return false;
    }
    if (layout.error) {
      this.statsEl.innerHTML = `<span style="color:#a33">${layout.error}</span>`;
      return false;
    }
    this.layout = layout;
    this._lastPreparedText = text;
    this.computeSlots();
    this.resetSvg();
    this.populateReadingPanel();
    this.updateStats();
    await this.drawFrame();
    this.tokensSeen = 0;
    this.lastDot = null;
    this.lastSectionIdx = -1;
    this.lastThoughtPos = null;
    this.thoughtCount = 0;
    return true;
  }

  async start() {
    this.go.disabled = true;
    this.restart.disabled = true;
    const ok = await this.prepareLayout();
    if (!ok) {
      this.go.disabled = false;
      return;
    }
    this.restart.disabled = false;
    this.advance(0);
  }

  computeSlots() {
    const sections = this.layout.sections;
    const n = sections.length;
    const angles = sections.map(s => Math.atan2(s.pos_2d[1], s.pos_2d[0]));
    const order = [...Array(n).keys()].sort((a, b) => angles[a] - angles[b]);
    const slotIndex = new Array(n);
    for (let pos = 0; pos < n; pos++) slotIndex[order[pos]] = pos;
    let heaviest = 0;
    for (let i = 1; i < n; i++) {
      if (sections[i].tokens > sections[heaviest].tokens) heaviest = i;
    }
    const slotArc = (2 * Math.PI) / n;
    const baseCentre = -Math.PI + (slotIndex[heaviest] + 0.5) * slotArc;
    const rotation = -Math.PI / 2 - baseCentre;
    sections.forEach((s, i) => {
      s.slotIndex = slotIndex[i];
      s.slotArc = slotArc;
      s.slotCentre = -Math.PI + (slotIndex[i] + 0.5) * slotArc + rotation;
      s.slotStart = s.slotCentre - slotArc / 2;
      s.slotEnd = s.slotCentre + slotArc / 2;
      s.hue = ((s.slotCentre * 180) / Math.PI + 360) % 360;
      s.vx = CX + R.VERTEX * Math.cos(s.slotCentre);
      s.vy = CY + R.VERTEX * Math.sin(s.slotCentre);
    });

    // Cloud scale from 98th percentile of sentence radii
    const sentences = this.layout.sentences;
    const radii = sentences.map(s => Math.hypot(s.pos_2d[0], s.pos_2d[1]));
    radii.sort((a, b) => a - b);
    const p98 = radii.length > 0 ? radii[Math.floor(radii.length * 0.98)] || 1e-6 : 1;
    this.cloudScale = R.CLOUD / Math.max(p98, 1e-6);

    // Per-section tick allocation
    this.sectionTickAccum = sections.map(() => 0);
    this.sectionTickTotal = sections.map(s => Math.min(s.tokens, 240));
  }

  resetSvg() {
    // The structural skeleton (defs, bg, rotation-group, layer groups,
    // thinking rings) is built once and preserved across rebuilds. This is
    // critical: replacing #rotation-group restarts its CSS animation from
    // 0°, which the user perceives as "rotation stops" when re-conjuring or
    // auto-conjuring at infer-time. Clearing only the children keeps the
    // animation state alive.
    if (!this._svgInitialized) {
      this.svg.innerHTML = "";
      const defs = document.createElementNS(SVG_NS, "defs");
      defs.innerHTML = `
        <filter id="thought-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      `;
      this.svg.appendChild(defs);
      const bg = document.createElementNS(SVG_NS, "rect");
      bg.setAttribute("width", SVG_SIZE);
      bg.setAttribute("height", SVG_SIZE);
      bg.setAttribute("fill", BG);
      this.svg.appendChild(bg);

      const rot = document.createElementNS(SVG_NS, "g");
      rot.setAttribute("id", "rotation-group");
      this.svg.appendChild(rot);
      this.rotationGroup = rot;

      const makeR = (id) => {
        const g = document.createElementNS(SVG_NS, "g");
        g.setAttribute("id", id);
        rot.appendChild(g);
        return g;
      };
      const makeFixed = (id) => {
        const g = document.createElementNS(SVG_NS, "g");
        g.setAttribute("id", id);
        this.svg.appendChild(g);
        return g;
      };

      this.layers = {
        boundary: makeR("boundary"),
        polygon: makeR("polygon-faint"),
        cloud: makeR("cloud"),
        sentencePath: makeR("sentence-path"),
        sectionPath: makeR("section-path"),
        dividers: makeR("dividers"),
        ticks: makeR("ticks"),
        vertices: makeR("vertices"),
        ornaments: makeR("ornaments"),
        scanBeam: makeR("scan-beam"),
        // User-drawn strokes go in the rotation group so they rotate with
        // the sections they mark. Drawn at logical (paused) coords.
        userStrokes: makeR("user-strokes"),
        progressArc: makeFixed("progress-arc"),
        thinkingRings: makeFixed("thinking-rings"),
        seal: makeFixed("seal"),
        centre: makeFixed("centre"),
      };
      for (let i = 0; i < 3; i++) {
        const c = document.createElementNS(SVG_NS, "circle");
        c.setAttribute("cx", CX);
        c.setAttribute("cy", CY);
        c.setAttribute("r", 80);
        c.setAttribute("fill", "none");
        c.setAttribute("stroke", "hsl(45 85% 50%)");
        c.setAttribute("stroke-width", "1.6");
        c.classList.add("thinking-ring");
        this.layers.thinkingRings.appendChild(c);
      }
      this._svgInitialized = true;
    } else {
      // Clear children of all layers but preserve the group elements
      // themselves so #rotation-group keeps its running CSS animation.
      for (const [key, el] of Object.entries(this.layers)) {
        if (key === "thinkingRings") continue; // these are static structure
        while (el.firstChild) el.removeChild(el.firstChild);
      }
    }
    this.sectionVertexEls = [];
    this.startRotation();
  }

  startRotation() {
    // No-op: rotation now driven by CSS keyframes on #rotation-group, which
    // run on the compositor and keep animating even while WASM blocks the
    // main thread. Kept as a method so external callers don't break.
  }

  setRotationSpeed(seconds) {
    // Override the CSS animation duration. Pass seconds-per-revolution.
    if (this.rotationGroup) {
      this.rotationGroup.style.animationDuration = `${seconds}s`;
    }
  }

  async drawFrame() {
    // Outer boundary
    this.circle(this.layers.boundary, CX, CY, R.BOUND_OUT, {
      fill: "none", stroke: INK, "stroke-width": 1.6, "stroke-opacity": 0.85,
    });
    this.circle(this.layers.boundary, CX, CY, R.BOUND_IN, {
      fill: "none", stroke: INK, "stroke-width": 0.8, "stroke-opacity": 0.6,
    });
    this.circle(this.layers.boundary, CX, CY, R.DIV_IN, {
      fill: "none", stroke: INK, "stroke-width": 0.4, "stroke-opacity": 0.3,
    });
    this.circle(this.layers.boundary, CX, CY, R.VERTEX_OUT, {
      fill: "none", stroke: INK, "stroke-width": 0.4, "stroke-opacity": 0.25,
    });

    // Slot dividers + section vertices appear in document order
    const sections = this.layout.sections;
    for (let i = 0; i < sections.length; i++) {
      const s = sections[i];
      const a = s.slotStart;
      const [x1, y1] = polar(R.DIV_IN, a);
      const [x2, y2] = polar(R.BOUND_IN, a);
      this.line(this.layers.dividers, x1, y1, x2, y2, {
        stroke: INK, "stroke-width": 0.5, "stroke-opacity": 0.45,
      });

      // Initial small vertex disc, will grow with token count progressively
      const v = this.circle(this.layers.vertices, s.vx, s.vy, 4.5, {
        fill: `hsl(${s.hue} 65% 55%)`,
        stroke: INK, "stroke-width": 0.9, "fill-opacity": 0.4,
      });
      v.dataset.baseR = "4.5";
      this.sectionVertexEls.push(v);

      if (i % 4 === 0) await sleep(8);
    }

    // Faint k-NN polygon background (precomputed)
    const sim = this.layout.similarity;
    const edges = knnEdges(sim, 4, 0.08);
    for (const [a, b, w] of edges) {
      const sa = sections[a], sb = sections[b];
      this.line(this.layers.polygon, sa.vx, sa.vy, sb.vx, sb.vy, {
        stroke: INK, "stroke-width": 0.4,
        "stroke-opacity": (0.08 + w * 0.20).toFixed(2),
      });
    }

    // Central seal
    this.circle(this.layers.seal, CX, CY, R.SEAL_OUT, {
      fill: BG, stroke: INK, "stroke-width": 0.9, "stroke-opacity": 0.8,
    });
    this.circle(this.layers.seal, CX, CY, R.SEAL_IN, {
      fill: "none", stroke: INK, "stroke-width": 0.5, "stroke-opacity": 0.45,
    });
    const t = document.createElementNS(SVG_NS, "text");
    t.setAttribute("x", CX);
    t.setAttribute("y", CY + 5);
    t.setAttribute("text-anchor", "middle");
    t.setAttribute("font-family", "ui-monospace, Menlo, Consolas, monospace");
    t.setAttribute("font-size", "11");
    t.setAttribute("fill", "#444");
    t.textContent = this.layout.title || "";
    this.layers.centre.appendChild(t);

    // Initial scan beam (invisible)
    this.beam = this.line(this.layers.scanBeam, CX, CY, CX, CY - R.VERTEX, {
      stroke: INK, "stroke-width": 1.0, "stroke-opacity": 0,
      "stroke-dasharray": "4 4",
    });
    // Progress arc placeholder
    this.arcPath = document.createElementNS(SVG_NS, "path");
    this.arcPath.setAttribute("fill", "none");
    this.arcPath.setAttribute("stroke", INK);
    this.arcPath.setAttribute("stroke-width", "5");
    this.arcPath.setAttribute("stroke-opacity", "0.85");
    this.arcPath.setAttribute("stroke-linecap", "round");
    this.layers.progressArc.appendChild(this.arcPath);
  }

  advance(i) {
    const sentences = this.layout.sentences;
    if (i >= sentences.length) {
      this.drawFinalOrnaments();
      this.beamFadeOut();
      this.go.disabled = false;
      return;
    }
    this.drawSentence(i);
    const delay = Math.max(8, 800 / Number(this.speed.value));
    this.timer = setTimeout(() => this.advance(i + 1), delay);
  }

  drawSentence(i) {
    const s = this.layout.sentences[i];
    const sec = this.layout.sections[s.section_idx];

    // Reading panel
    this.unitEls.forEach((el, j) => {
      el.classList.remove("now");
      if (j < i) el.classList.add("read");
    });
    const cur = this.unitEls[i];
    if (cur) {
      cur.classList.add("now");
      cur.style.background = `hsl(${sec.hue} 70% 86%)`;
      cur.style.borderLeftColor = `hsl(${sec.hue} 65% 40%)`;
      cur.scrollIntoView({ behavior: "smooth", block: "center" });
    }
    this.nowSection.innerHTML = `<b style="color:hsl(${sec.hue} 65% 30%)">▸ ${escape(sec.heading)}</b>`;

    // Cloud dot at this sentence's PCA position
    const dx = CX + s.pos_2d[0] * this.cloudScale;
    const dy = CY + s.pos_2d[1] * this.cloudScale;
    const inSeal =
      (dx - CX) ** 2 + (dy - CY) ** 2 < (R.SEAL_OUT + 4) ** 2;
    let dot = null;
    if (!inSeal) {
      dot = this.circle(this.layers.cloud, dx, dy, 2.2, {
        fill: `hsl(${sec.hue} 60% 50%)`,
        "fill-opacity": 0,
      });
      this.fadeIn(dot, 220);
      // halo
      const halo = this.circle(this.layers.cloud, dx, dy, 12, {
        fill: "none",
        stroke: `hsl(${sec.hue} 70% 45%)`,
        "stroke-width": 1.2,
        "stroke-opacity": 0.7,
      });
      this.expandAndFade(halo, 8, 24, 360);
    }

    // Connect to last dot
    if (this.lastDot && dot) {
      const same = this.lastSectionIdx === s.section_idx;
      if (same) {
        const ln = this.line(this.layers.sentencePath,
          this.lastDot.x, this.lastDot.y, dx, dy, {
            stroke: `hsl(${sec.hue} 55% 45%)`,
            "stroke-width": 0.9,
            "stroke-opacity": 0.55,
            "stroke-linecap": "round",
          });
        this.fadeIn(ln, 200);
      } else {
        const arr = this.arrow(this.layers.sentencePath,
          this.lastDot.x, this.lastDot.y, dx, dy,
          `hsl(${sec.hue} 65% 35%)`, 1.2, 6, 0.8);
        this.fadeIn(arr, 220);
      }
    }
    if (dot) {
      this.lastDot = { x: dx, y: dy };
    } else if (!this.lastDot) {
      this.lastDot = { x: dx, y: dy };
    } else {
      this.lastDot = { x: dx, y: dy };
    }

    // Section transition arrow on R_VERTEX ring (document order)
    if (this.lastSectionIdx >= 0 && this.lastSectionIdx !== s.section_idx) {
      const prev = this.layout.sections[this.lastSectionIdx];
      const tFrac = i / Math.max(1, this.layout.sentences.length - 1);
      const hue = 220 - tFrac * 220;
      const arr = this.arrow(this.layers.sectionPath,
        prev.vx, prev.vy, sec.vx, sec.vy,
        `hsl(${hue.toFixed(0)} 60% 30%)`, 1.6, 9, 0.85);
      this.fadeIn(arr, 280);
    }

    // Pulse current section vertex (size grows toward final size)
    const v = this.sectionVertexEls[s.section_idx];
    if (v) {
      v.setAttribute("fill-opacity", 0.95);
      const r = Number(v.getAttribute("r")) || 4.5;
      const targetR = 4.5 + Math.log1p(sec.tokens) * 1.4;
      const newR = Math.min(targetR, r + 0.6 * Math.log1p(s.tokens || 1));
      v.setAttribute("r", newR);
      v.dataset.baseR = String(newR);
    }

    // Add token ticks for this sentence in its section's slot
    const ntoks = Math.max(1, s.tokens);
    const totalTicks = this.sectionTickTotal[s.section_idx] || sec.tokens;
    let placed = this.sectionTickAccum[s.section_idx];
    const cap = Math.min(this.sectionTickTotal[s.section_idx], placed + ntoks);
    for (let k = placed; k < cap; k++) {
      const t = (k + 0.5) / Math.max(1, totalTicks);
      const a = sec.slotStart + sec.slotArc * (0.04 + t * 0.92);
      const [x1, y1] = polar(R.TOKEN_IN, a);
      const [x2, y2] = polar(R.TOKEN_OUT, a);
      this.line(this.layers.ticks, x1, y1, x2, y2, {
        stroke: `hsl(${sec.hue} 65% 35%)`,
        "stroke-width": 0.7,
        "stroke-opacity": 0.85,
      });
    }
    this.sectionTickAccum[s.section_idx] = cap;

    // Scan beam from centre to current vertex
    if (this.beam) {
      this.beam.setAttribute("x1", CX);
      this.beam.setAttribute("y1", CY);
      this.beam.setAttribute("x2", sec.vx);
      this.beam.setAttribute("y2", sec.vy);
      this.beam.setAttribute("stroke", `hsl(${sec.hue} 65% 30%)`);
      this.beam.setAttribute("stroke-opacity", "0.55");
    }

    // Progress arc
    this.tokensSeen += s.tokens || 1;
    const total = this.layout.totals.tokens || 1;
    const frac = Math.min(1, this.tokensSeen / total);
    this.updateProgressArc(frac);

    this.lastSectionIdx = s.section_idx;
    this.updateStats(i + 1);
  }

  drawFinalOrnaments() {
    // Vertex ornaments — subsection dots, bullet petals, code petals
    const sections = this.layout.sections;
    sections.forEach((sec, i) => {
      const a = sec.slotCentre;
      const [vx, vy] = [sec.vx, sec.vy];
      const size = 4.5 + Math.log1p(sec.tokens) * 1.4;
      const density = sec.imperatives / Math.max(1, sec.tokens);
      const light = Math.max(28, 55 - Math.min(0.05, density) / 0.05 * 25);
      const v = this.sectionVertexEls[i];
      if (v) {
        v.setAttribute("r", size);
        v.dataset.baseR = String(size);
        v.setAttribute("fill", `hsl(${sec.hue} 65% ${light}%)`);
        v.setAttribute("fill-opacity", "1.0");
      }
      const subN = sec.subsections;
      for (let k = 0; k < subN; k++) {
        const offset = (k - (subN - 1) / 2) * 5.5;
        const ax = Math.cos(a + Math.PI / 2);
        const ay = Math.sin(a + Math.PI / 2);
        const dxOff = Math.cos(a) * 14;
        const dyOff = Math.sin(a) * 14;
        const cx = vx + ax * offset + dxOff;
        const cy = vy + ay * offset + dyOff;
        const dot = this.circle(this.layers.ornaments, cx, cy, 1.7, {
          fill: `hsl(${sec.hue} 65% 40%)`,
          "fill-opacity": 0,
        });
        this.fadeIn(dot, 300);
      }
      for (let k = 0; k < sec.bullets; k++) {
        const spread = (k - (sec.bullets - 1) / 2) * 0.02;
        const [xa, ya] = polar(R.VERTEX - size - 4, a + spread);
        const [xb, yb] = polar(R.VERTEX - size - 14, a + spread);
        const ln = this.line(this.layers.ornaments, xa, ya, xb, yb, {
          stroke: INK, "stroke-width": 0.7, "stroke-opacity": 0,
        });
        this.fadeIn(ln, 280, 0.55);
      }
      for (let k = 0; k < sec.code_blocks; k++) {
        const spread = (k - (sec.code_blocks - 1) / 2) * 0.02;
        const [xa, ya] = polar(R.VERTEX + size + 4, a + spread);
        const [xb, yb] = polar(R.VERTEX + size + 14, a + spread);
        const ln = this.line(this.layers.ornaments, xa, ya, xb, yb, {
          stroke: INK, "stroke-width": 0.9, "stroke-opacity": 0,
        });
        this.fadeIn(ln, 320, 0.7);
      }
      for (let k = 0; k < sec.refs; k++) {
        const spread = (k - (sec.refs - 1) / 2) * 0.012;
        const [xa, ya] = polar(R.BOUND_OUT + 4, a + spread);
        const [xb, yb] = polar(R.BOUND_OUT + 18, a + spread);
        const ln = this.line(this.layers.ornaments, xa, ya, xb, yb, {
          stroke: INK, "stroke-width": 1.0, "stroke-opacity": 0,
        });
        this.fadeIn(ln, 320, 0.85);
      }
    });
  }

  beamFadeOut() {
    if (!this.beam) return;
    const start = performance.now();
    const cur = Number(this.beam.getAttribute("stroke-opacity")) || 0.5;
    const tick = () => {
      const t = (performance.now() - start) / 700;
      if (t >= 1) {
        this.beam.setAttribute("stroke-opacity", "0");
        return;
      }
      this.beam.setAttribute("stroke-opacity", String(cur * (1 - t)));
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  updateProgressArc(frac) {
    const aStart = -Math.PI / 2;
    const aEnd = aStart + frac * 2 * Math.PI;
    const r = R.BOUND_OUT + 16;
    if (frac <= 0) { this.arcPath.setAttribute("d", ""); return; }
    if (frac >= 0.999) {
      // full circle
      const d = `M ${CX + r} ${CY} A ${r} ${r} 0 1 1 ${CX - r} ${CY} A ${r} ${r} 0 1 1 ${CX + r} ${CY}`;
      this.arcPath.setAttribute("d", d);
      return;
    }
    const [x1, y1] = polar(r, aStart);
    const [x2, y2] = polar(r, aEnd);
    const large = (aEnd - aStart) > Math.PI ? 1 : 0;
    const d = `M ${x1.toFixed(1)} ${y1.toFixed(1)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(1)} ${y2.toFixed(1)}`;
    this.arcPath.setAttribute("d", d);
  }

  populateReadingPanel() {
    this.readingEl.innerHTML = "";
    this.unitEls = [];
    let lastSection = -1;
    this.layout.sentences.forEach((s, i) => {
      if (s.section_idx !== lastSection) {
        const sec = this.layout.sections[s.section_idx];
        const h = document.createElement("div");
        h.className = "unit heading";
        h.style.color = `hsl(${sec.hue} 65% 30%)`;
        h.textContent = "#".repeat(sec.depth) + " " + sec.heading;
        this.readingEl.appendChild(h);
        lastSection = s.section_idx;
      }
      const el = document.createElement("div");
      el.className = "unit";
      el.textContent = s.text;
      this.readingEl.appendChild(el);
      this.unitEls.push(el);
    });
  }

  updateStats(progress) {
    const t = this.layout.totals;
    const n = this.layout.sentences.length;
    const cur = progress != null ? `${progress} / ${n} units · ${this.tokensSeen} / ${t.tokens} tokens` :
      `${t.tokens} tokens · ${t.sections} sections · ${n} units`;
    this.statsEl.innerHTML = `<b>${cur}</b><br>${t.imperatives} imperatives · ${t.bullets} bullets · ${t.refs} refs`;
  }

  // ----- SVG helpers -----
  circle(parent, cx, cy, r, attrs) {
    const el = document.createElementNS(SVG_NS, "circle");
    el.setAttribute("cx", cx); el.setAttribute("cy", cy); el.setAttribute("r", r);
    for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
    parent.appendChild(el);
    return el;
  }
  line(parent, x1, y1, x2, y2, attrs) {
    const el = document.createElementNS(SVG_NS, "line");
    el.setAttribute("x1", x1); el.setAttribute("y1", y1);
    el.setAttribute("x2", x2); el.setAttribute("y2", y2);
    for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
    parent.appendChild(el);
    return el;
  }
  arrow(parent, x1, y1, x2, y2, stroke, width, head, opacity) {
    const dx = x2 - x1, dy = y2 - y1;
    const length = Math.hypot(dx, dy);
    if (length < 1e-3) return null;
    const angle = Math.atan2(dy, dx);
    const back = Math.min(head * 0.6, length * 0.9);
    const bx = x2 - back * Math.cos(angle);
    const by = y2 - back * Math.sin(angle);
    const g = document.createElementNS(SVG_NS, "g");
    parent.appendChild(g);
    const ln = document.createElementNS(SVG_NS, "line");
    ln.setAttribute("x1", x1); ln.setAttribute("y1", y1);
    ln.setAttribute("x2", bx); ln.setAttribute("y2", by);
    ln.setAttribute("stroke", stroke);
    ln.setAttribute("stroke-width", width);
    ln.setAttribute("stroke-opacity", opacity);
    ln.setAttribute("stroke-linecap", "round");
    g.appendChild(ln);
    const a1 = angle + Math.PI - 0.45;
    const a2 = angle + Math.PI + 0.45;
    const px1 = x2 + head * Math.cos(a1);
    const py1 = y2 + head * Math.sin(a1);
    const px2 = x2 + head * Math.cos(a2);
    const py2 = y2 + head * Math.sin(a2);
    const tri = document.createElementNS(SVG_NS, "polygon");
    tri.setAttribute("points", `${x2},${y2} ${px1.toFixed(1)},${py1.toFixed(1)} ${px2.toFixed(1)},${py2.toFixed(1)}`);
    tri.setAttribute("fill", stroke);
    tri.setAttribute("fill-opacity", opacity);
    g.appendChild(tri);
    return g;
  }

  fadeIn(el, ms, target) {
    const targetOp = target != null ? target : Number(el.getAttribute("stroke-opacity") || el.getAttribute("fill-opacity") || 1);
    const isStroke = el.getAttribute("stroke") && el.tagName !== "circle";
    const setOp = (v) => {
      if (el.tagName === "circle" && el.getAttribute("fill") !== "none") {
        el.setAttribute("fill-opacity", v);
      }
      if (el.getAttribute("stroke") && el.getAttribute("stroke") !== "none") {
        el.setAttribute("stroke-opacity", v);
      }
      if (el.tagName === "g") {
        el.querySelectorAll("[stroke]").forEach(c => c.setAttribute("stroke-opacity", v));
        el.querySelectorAll("polygon").forEach(c => c.setAttribute("fill-opacity", v));
      }
    };
    const start = performance.now();
    const tick = () => {
      const t = Math.min(1, (performance.now() - start) / ms);
      setOp(targetOp * t);
      if (t < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  expandAndFade(el, fromR, toR, ms) {
    const start = performance.now();
    const tick = () => {
      const t = Math.min(1, (performance.now() - start) / ms);
      el.setAttribute("r", fromR + (toR - fromR) * t);
      el.setAttribute("stroke-opacity", (0.7 * (1 - t)).toFixed(2));
      if (t < 1) requestAnimationFrame(tick);
      else el.remove();
    };
    requestAnimationFrame(tick);
  }

  // ----- LLM hooks -----
  resetThoughts() {
    this.lastThoughtPos = null;
    this.thoughtCount = 0;
  }

  addThought(data) {
    if (!this.layout || !data || !data.pos_2d || !this.cloudScale) return;
    const [px, py] = data.pos_2d;
    // Honest placement: anchor each thought near the section it most resembles
    // (top cosine similarity), at a radius proportional to confidence. This is
    // more legible than the raw PCA-projected position, which collapses near
    // the origin for short generated chunks (TF-IDF vectors of small text are
    // tiny). The PCA value still drives a small offset so consecutive thoughts
    // hitting the same section spread out instead of overlapping.
    let dx, dy;
    if (data.top_section >= 0 && data.top_score > 0.02 && this.layout.sections[data.top_section]) {
      const sec = this.layout.sections[data.top_section];
      const conf = Math.min(1, data.top_score * 5);
      const r = 220 + conf * 280;  // 220 (low conf) → 500 (high conf), in viewBox units
      const angleDrift = ((this.thoughtCount % 7) - 3) * 0.025;
      const angle = sec.slotCentre + angleDrift;
      dx = CX + r * Math.cos(angle);
      dy = CY + r * Math.sin(angle);
      // Slight PCA-derived offset for variety between same-section thoughts.
      dx += py * this.cloudScale * 1.2;
      dy += -px * this.cloudScale * 1.2;
    } else {
      // No clear section match — place from PCA projection, amplified to be
      // visible outside the central seal.
      dx = CX + px * this.cloudScale * 6;
      dy = CY + py * this.cloudScale * 6;
    }

    // Gold-tinted to distinguish AI output from prompt (the prompt is hued by section angle).
    const goldHue = 45;
    const sectionHue =
      data.top_section >= 0 && this.layout.sections[data.top_section]
        ? this.layout.sections[data.top_section].hue
        : goldHue;

    // Halo expanding outward.
    const halo = this.circle(this.layers.cloud, dx, dy, 6, {
      fill: "none",
      stroke: `hsl(${goldHue} 85% 55%)`,
      "stroke-width": 1.6,
      "stroke-opacity": 0.95,
    });
    this.expandAndFade(halo, 6, 36, 700);

    // Core dot — gold, with glow filter.
    const dot = this.circle(this.layers.cloud, dx, dy, 3.4, {
      fill: `hsl(${goldHue} 95% 55%)`,
      stroke: "#000",
      "stroke-width": 0.5,
      "fill-opacity": 0,
      filter: "url(#thought-glow)",
    });
    this.fadeIn(dot, 280);

    // Connect to last thought.
    if (this.lastThoughtPos) {
      const ln = this.line(
        this.layers.sentencePath,
        this.lastThoughtPos.x, this.lastThoughtPos.y, dx, dy,
        {
          stroke: `hsl(${goldHue} 75% 45%)`,
          "stroke-width": 1.6,
          "stroke-opacity": 0,
          "stroke-linecap": "round",
        }
      );
      this.fadeIn(ln, 350, 0.85);
    } else {
      // First thought: draw a faint arrow from the central seal outward to it.
      const angle = Math.atan2(dy - CY, dx - CX);
      const sx = CX + R.SEAL_OUT * Math.cos(angle);
      const sy = CY + R.SEAL_OUT * Math.sin(angle);
      const arr = this.arrow(
        this.layers.sentencePath, sx, sy, dx, dy,
        `hsl(${goldHue} 80% 45%)`, 1.4, 8, 0.85
      );
      this.fadeIn(arr, 400);
    }
    this.lastThoughtPos = { x: dx, y: dy };
    this.thoughtCount += 1;

    // Pulse the section being drawn from.
    if (data.top_section >= 0 && this.sectionVertexEls[data.top_section]) {
      this.pulseVertex(this.sectionVertexEls[data.top_section], data.top_score || 0);
      const sec = this.layout.sections[data.top_section];
      this.nowSection.innerHTML =
        `<b style="color:hsl(${goldHue} 75% 35%)">⊙ thinking from</b> ` +
        `<span style="color:hsl(${sec.hue} 65% 30%)">${escape(sec.heading)}</span>` +
        ` <span class="mute">(${(data.top_score * 100).toFixed(0)}%)</span>`;
    }
  }

  pulseVertex(el, intensity) {
    // Read or initialize the canonical base radius. We must NOT use the
    // current `r` because if a previous pulse is still running, `r` is
    // mid-animation and using it would cause runaway growth on each call.
    let baseR = Number(el.dataset.baseR);
    if (!baseR || Number.isNaN(baseR)) {
      baseR = Number(el.getAttribute("r")) || 6;
      el.dataset.baseR = String(baseR);
    }
    // Single pulse at a time per vertex; subsequent calls during a pulse
    // are dropped to keep the animation bounded.
    if (el.dataset.pulsing === "1") return;
    el.dataset.pulsing = "1";
    const peak = baseR * (1.4 + Math.min(1, intensity) * 0.6);
    const start = performance.now();
    const tick = () => {
      const t = (performance.now() - start) / 700;
      if (t >= 1) {
        el.setAttribute("r", baseR);
        el.dataset.pulsing = "0";
        return;
      }
      const phase = Math.sin(t * Math.PI);
      el.setAttribute("r", baseR + (peak - baseR) * phase);
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }
}

class LLM {
  constructor(sigil) {
    this.sigil = sigil;
    this.generator = null;
    this.modelId = null;
    this.aborted = false;

    this.modelPicker = document.getElementById("model-picker");
    this.customInput = document.getElementById("custom-model");
    this.loadBtn = document.getElementById("load-model");
    this.modelStatus = document.getElementById("model-status");
    this.queryEl = document.getElementById("query");
    this.runBtn = document.getElementById("run-llm");
    this.stopBtn = document.getElementById("stop-llm");
    this.maxTokens = document.getElementById("max-tokens");
    this.outputEl = document.getElementById("thought-output");

    this.modelPicker.addEventListener("change", () => {
      this.customInput.style.display =
        this.modelPicker.value === "custom" ? "" : "none";
    });
    this.loadBtn.addEventListener("click", () => this.loadModel());
    this.runBtn.addEventListener("click", () => this.run());
    this.stopBtn.addEventListener("click", () => this.stop());
  }

  selectedId() {
    if (this.modelPicker.value === "custom") {
      return (this.customInput.value || "").trim();
    }
    return this.modelPicker.value;
  }

  async loadModel() {
    const id = this.selectedId();
    if (!id) {
      this.modelStatus.textContent = "(enter a model id)";
      return;
    }
    this.loadBtn.disabled = true;
    this.runBtn.disabled = true;

    const forceWasm = document.getElementById("force-wasm")?.checked;
    const dtypeChoice = document.getElementById("dtype-choice")?.value || "auto";

    // Use a SHORT chain. Each failed attempt re-downloads a different .onnx_data
    // file (~hundreds of MB), so trying many combinations wastes bandwidth.
    let attempts;
    if (dtypeChoice !== "auto") {
      attempts = forceWasm
        ? [{ device: "wasm", dtype: dtypeChoice }]
        : [{ device: "webgpu", dtype: dtypeChoice }, { device: "wasm", dtype: dtypeChoice }];
    } else if (forceWasm) {
      attempts = [{ device: "wasm", dtype: "q8" }];   // q8 is the most reliable WASM dtype
    } else {
      attempts = [
        { device: "webgpu", dtype: "q4" },
        { device: "wasm", dtype: "q8" },
      ];
    }

    const startedAt = Date.now();

    let downloadedFiles = new Set();
    let downloadingByteCounts = new Map();
    let allDownloadsDone = false;

    const tryLoad = async ({ device, dtype }) => {
      return await pipeline("text-generation", id, {
        device,
        dtype,
        progress_callback: (p) => {
          if (p.status === "progress" && p.file) {
            // HF's CDN doesn't return Content-Length, so p.progress is unreliable
            // (often >100%). Display only actual bytes downloaded + elapsed.
            downloadingByteCounts.set(p.file, p.loaded || 0);
            const totalMB = [...downloadingByteCounts.values()]
              .reduce((a, b) => a + b, 0) / 1e6;
            this.modelStatus.textContent =
              `${device}/${dtype} · downloading ${p.file} · ${totalMB.toFixed(1)}MB total / ${fmtElapsed()}`;
          } else if (p.status === "initiate" && p.file) {
            this.modelStatus.textContent =
              `${device}/${dtype} · fetching ${p.file}...`;
          } else if (p.status === "done" && p.file) {
            downloadedFiles.add(p.file);
            const totalMB = [...downloadingByteCounts.values()]
              .reduce((a, b) => a + b, 0) / 1e6;
            this.modelStatus.textContent =
              `${device}/${dtype} · ${downloadedFiles.size} files done · ${totalMB.toFixed(1)}MB · instantiating in browser (this may take 1-3 min for large models)...`;
            allDownloadsDone = true;
          } else if (p.status === "ready") {
            // model is fully ready
          } else if (p.status) {
            this.modelStatus.textContent =
              `${device}/${dtype} · ${p.status}${p.file ? ": " + p.file : ""}`;
          }
        },
      });
    };

    const fmtElapsed = () => `${((Date.now() - startedAt) / 1000).toFixed(0)}s`;

    let lastErr = null;
    for (const opts of attempts) {
      this.modelStatus.textContent =
        `loading ${opts.device}/${opts.dtype}... (first time downloads ~300MB; cached after)`;
      try {
        this.generator = await tryLoad(opts);
        const took = ((Date.now() - startedAt) / 1000).toFixed(0);
        this.modelStatus.textContent =
          `loaded: ${id} (${opts.device}/${opts.dtype}, ${took}s)`;
        this.modelId = id;
        this.runBtn.disabled = false;
        this.loadBtn.disabled = false;
        return;
      } catch (e) {
        lastErr = e;
        this.modelStatus.textContent =
          `${opts.device}/${opts.dtype} failed: ${(e.message || e).slice(0, 200)}`;
      }
    }
    this.modelStatus.textContent =
      `all attempts failed. last: ${(lastErr && lastErr.message) || lastErr}`;
    this.loadBtn.disabled = false;
  }

  async run() {
    // Preconditions — make any failure visible in BOTH places.
    const showError = (msg) => {
      this.modelStatus.textContent = msg;
      this.outputEl.textContent = "[" + msg + "]";
      this.outputEl.style.color = "#a33";
    };
    if (!this.generator) { showError("load a model first"); return; }
    const sysPrompt = this.sigil.input.value;
    let query = this.queryEl.value.trim();
    if (!query) { showError("enter a query first"); return; }
    if (!this.sigil.layout || this.sigil._lastPreparedText !== sysPrompt) {
      this.modelStatus.textContent = "auto-conjuring sigil for current prompt...";
      const ok = await this.sigil.prepareLayout();
      if (!ok) {
        showError("could not prepare sigil layout — see stats panel");
        return;
      }
    }
    // Inject interpretation of any human-drawn strokes into the user query.
    if (window.sketcher) {
      const annot = window.sketcher.toQueryAnnotation();
      if (annot) {
        query = query + annot;
        this.modelStatus.textContent = "drawn intent → injected into query";
      }
    }

    const messages = [
      { role: "system", content: sysPrompt },
      { role: "user", content: query },
    ];

    this.outputEl.style.color = "#333";
    this.outputEl.textContent =
      "(thinking — sigil keeps rotating via CSS even while WASM holds the main thread. " +
      "Trajectory will be drawn after generation finishes.)";
    this.runBtn.disabled = true;
    this.stopBtn.disabled = false;
    this.aborted = false;
    this.sigil.resetThoughts();
    document.body.classList.add("thinking");
    this.modelStatus.textContent = "running inference (sigil shows live thinking animation)...";

    const startedRun = Date.now();
    let buffer = "";

    const streamer = new TextStreamer(this.generator.tokenizer, {
      skip_prompt: true,
      skip_special_tokens: true,
      callback_function: (text) => {
        if (this.aborted) return;
        buffer += text;
        // The DOM update may not paint until WASM yields, but at least
        // when the browser does paint, the latest text is visible.
        this.outputEl.textContent = buffer;
      },
    });

    try {
      await this.generator(messages, {
        max_new_tokens: Number(this.maxTokens.value) || 200,
        do_sample: false,
        streamer,
      });
      const genSecs = ((Date.now() - startedRun) / 1000).toFixed(1);
      this.modelStatus.textContent =
        `generated ${buffer.length} chars in ${genSecs}s · drawing trajectory...`;
      if (buffer.length === 0) {
        this.outputEl.textContent =
          "[no tokens generated — model may not support this chat template, " +
          "or generation stopped immediately. Check console.]";
        this.outputEl.style.color = "#a33";
      } else {
        const projections = await this.replayProjections(buffer);
        const total = ((Date.now() - startedRun) / 1000).toFixed(1);
        this.modelStatus.textContent =
          `done · ${buffer.length} chars · ${projections} projections · ${total}s total ` +
          `(${genSecs}s gen + ${(Number(total) - Number(genSecs)).toFixed(1)}s replay)`;
      }
    } catch (e) {
      console.error("inference error:", e);
      this.outputEl.textContent =
        `[error: ${e.message || e}]\n\n${(e.stack || "").slice(0, 500)}`;
      this.outputEl.style.color = "#a33";
      this.modelStatus.textContent = `inference failed: ${(e.message || e).slice(0, 120)}`;
    } finally {
      document.body.classList.remove("thinking");
      this.runBtn.disabled = false;
      this.stopBtn.disabled = true;
    }
  }

  // Replay the generated buffer as a sequence of projections. Each window
  // becomes a thought dot on the sigil. Runs AFTER generation so the main
  // thread is free for fetch() and DOM updates.
  async replayProjections(text) {
    const windowSize = 60;
    const stride = 30;
    let count = 0;
    const project = async (chunk) => {
      try {
        const resp = await fetch("/api/project", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: chunk }),
        });
        const data = await resp.json();
        if (data && !data.error) {
          this.sigil.addThought(data);
          count += 1;
        }
      } catch (e) {
        console.warn("project failed:", e);
      }
    };
    for (let i = 0; i < text.length && !this.aborted; i += stride) {
      const end = Math.min(i + windowSize, text.length);
      const window = text.slice(i, end);
      if (window.trim().length < 4) continue;
      await project(window);
      this.modelStatus.textContent =
        `drawing thought ${count} (${end}/${text.length} chars)`;
      await new Promise((r) => setTimeout(r, 220));
      if (end >= text.length) break;
    }
    return count;
  }

  stop() {
    this.aborted = true;
    // transformers.js streaming has no clean stop hook in v3 from outside;
    // we drop further callbacks and let the generation fall off internally.
    this.runBtn.disabled = false;
    this.stopBtn.disabled = true;
    this.modelStatus.textContent = "stopped (output continues internally)";
  }
}

function polar(r, theta) {
  return [CX + r * Math.cos(theta), CY + r * Math.sin(theta)];
}

function knnEdges(sim, k, minSim) {
  const n = sim.length;
  const edges = new Map();
  for (let i = 0; i < n; i++) {
    const row = sim[i].slice();
    row[i] = -Infinity;
    const order = row.map((v, j) => [v, j]).sort((a, b) => b[0] - a[0]);
    let kept = 0;
    for (const [v, j] of order) {
      if (kept >= k || v < minSim) break;
      const a = i < j ? i : j;
      const b = i < j ? j : i;
      const key = `${a},${b}`;
      const prev = edges.get(key);
      if (prev == null || v > prev[2]) edges.set(key, [a, b, v]);
      kept++;
    }
  }
  return [...edges.values()];
}

function escape(s) {
  return s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
