// ---------------------------------------------------------------------------
// Sketcher — the human side of the magic-circle protocol.
//
// Vocabulary (initial v0):
//   ◯ enclose (closed stroke around a section)  → emphasize that section
//   ─ connect (line passing near 2+ section vertices) → bridge them
//   ╳ cross  (two crossing strokes near one section) → suppress that section
//   • mark   (short stroke near one section)     → reference it
//
// All matching is in viewBox-coords; we pause rotation while drawing so the
// visual coords equal the logical coords. Strokes are added inside the
// rotation group, so once drawing finishes they rotate with the sections.
// ---------------------------------------------------------------------------
class Sketcher {
  constructor(sigil) {
    this.sigil = sigil;
    this.strokes = [];          // [{ points: [[x,y]...] }]
    this.current = null;        // active stroke being drawn
    this.currentPathEl = null;  // SVG path for active stroke
    this.drawing = false;       // mode flag

    this.toggleBtn = document.getElementById("draw-toggle");
    this.clearBtn = document.getElementById("draw-clear");
    this.helpBtn = document.getElementById("draw-help");
    this.scaffoldBtn = document.getElementById("draw-scaffold");
    this.blankBtn = document.getElementById("draw-blank");
    this.hintEl = document.getElementById("interpret-hint");

    this.toggleBtn.addEventListener("click", () => this.toggleMode());
    this.clearBtn.addEventListener("click", () => this.clear());
    this.helpBtn.addEventListener("click", () => this.showHelp());
    this.scaffoldBtn.addEventListener("click", () => this.scaffoldPrompt());
    this.blankBtn.addEventListener("click", () => this.blankCanvas());

    // Compose tool buttons (click-based composition)
    this.composeMode = "off"; // place | bridge | delete | off
    this.composedSections = []; // [{x, y, label}]
    this.composedBridges = []; // [{a, b}]
    this.composeSelectedIdx = null;
    this.toolButtons = document.querySelectorAll(".draw-controls [data-tool]");
    this.toolButtons.forEach((btn) => {
      btn.addEventListener("click", () => this.setComposeMode(btn.dataset.tool));
    });

    sigil.svg.addEventListener("pointerdown", (e) => this.onDown(e));
    sigil.svg.addEventListener("pointermove", (e) => this.onMove(e));
    sigil.svg.addEventListener("pointerup", (e) => this.onUp(e));
    sigil.svg.addEventListener("pointercancel", (e) => this.onUp(e));
    sigil.svg.addEventListener("pointerleave", (e) => this.onUp(e));

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (this.composeSelectedIdx != null) {
          this.composeSelectedIdx = null;
          this.renderComposed();
          this.updateComposeHint();
        } else if (this.composeMode !== "off") {
          this.setComposeMode("off");
        }
      }
    });
  }

  setComposeMode(mode) {
    this.composeMode = mode;
    this.composeSelectedIdx = null;
    this.toolButtons.forEach((b) =>
      b.classList.toggle("active", b.dataset.tool === mode)
    );
    if (mode !== "off") {
      if (this.sigil.rotationGroup) {
        this.sigil.rotationGroup.style.animationPlayState = "paused";
      }
      this.sigil.svg.style.cursor =
        mode === "delete" ? "not-allowed" : "crosshair";
      if (this.drawing) this.toggleMode();
    } else {
      if (this.sigil.rotationGroup) {
        this.sigil.rotationGroup.style.animationPlayState = "running";
      }
      this.sigil.svg.style.cursor = "default";
    }
    this.updateComposeHint();
  }

  parsePlace(mode) {
    // mode is "place:persona" or just "place" (legacy). Returns the type or null.
    if (!mode || !mode.startsWith("place")) return null;
    const parts = mode.split(":");
    return parts[1] || "persona";
  }

  updateComposeHint() {
    if (this.composeMode === "off") return;
    const placeType = this.parsePlace(this.composeMode);
    let body;
    if (placeType) {
      const t = SECTION_TYPES[placeType];
      body = `<b style="color:${t.color}">${t.glyph} ${t.label}</b> — click empty space to place; click an existing ${t.label} vertex to cycle preset`;
    } else if (this.composeMode === "bridge") {
      body =
        this.composeSelectedIdx == null
          ? "click a vertex to start a bridge"
          : "click another vertex to complete bridge (Esc to cancel)";
    } else if (this.composeMode === "delete") {
      body = "click a vertex to delete it";
    } else {
      body = "";
    }
    this.hintEl.innerHTML =
      body + ` <span class="mute">· ${this.composedSections.length} placed, ${this.composedBridges.length} bridge(s)</span>`;
  }

  ensureLayersForCompose() {
    // If layers don't exist (no conjure yet), build the bare structure.
    if (!this.sigil.layers || !this.sigil.layers.userStrokes) {
      this.sigil.resetSvg();
    }
  }

  findComposedAt(x, y, threshold = 28) {
    let best = -1, bestD = threshold;
    for (let i = 0; i < this.composedSections.length; i++) {
      const s = this.composedSections[i];
      const d = Math.hypot(s.x - x, s.y - y);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best === -1 ? null : best;
  }

  handleComposeClick(x, y) {
    this.ensureLayersForCompose();
    const placeType = this.parsePlace(this.composeMode);
    if (placeType) {
      const hit = this.findComposedAt(x, y);
      if (hit != null) {
        // Click on existing vertex while a place tool is active.
        const sec = this.composedSections[hit];
        if (sec.type === placeType) {
          // Cycle preset within same type
          const t = SECTION_TYPES[placeType];
          sec.presetIndex = (sec.presetIndex + 1) % t.presets.length;
        } else {
          // Re-type the vertex (preserve position)
          sec.type = placeType;
          sec.presetIndex = 0;
        }
      } else {
        // New vertex — snap to rim
        const dx = x - CX, dy = y - CY;
        const ang = Math.atan2(dy, dx);
        const sx = CX + R.VERTEX * Math.cos(ang);
        const sy = CY + R.VERTEX * Math.sin(ang);
        this.composedSections.push({
          x: sx, y: sy, angle: ang,
          type: placeType,
          presetIndex: 0,
        });
      }
      this.renderComposed();
      this.updateComposeHint();
      return;
    }
    if (this.composeMode === "bridge") {
      const hit = this.findComposedAt(x, y);
      if (hit == null) return;
      if (this.composeSelectedIdx == null) {
        this.composeSelectedIdx = hit;
      } else if (this.composeSelectedIdx !== hit) {
        this.composedBridges.push({
          a: this.composeSelectedIdx, b: hit,
        });
        this.composeSelectedIdx = null;
      } else {
        this.composeSelectedIdx = null; // deselect
      }
      this.renderComposed();
      this.updateComposeHint();
      return;
    }
    if (this.composeMode === "delete") {
      const hit = this.findComposedAt(x, y);
      if (hit == null) return;
      this.composedSections.splice(hit, 1);
      this.composedBridges = this.composedBridges
        .filter((b) => b.a !== hit && b.b !== hit)
        .map((b) => ({
          a: b.a > hit ? b.a - 1 : b.a,
          b: b.b > hit ? b.b - 1 : b.b,
        }));
      this.renderComposed();
      this.updateComposeHint();
    }
  }

  renderComposed() {
    const layer = this.sigil.layers.userStrokes;
    [...layer.querySelectorAll("[data-composed]")].forEach((el) => el.remove());
    // Bridges
    for (const br of this.composedBridges) {
      const a = this.composedSections[br.a];
      const b = this.composedSections[br.b];
      if (!a || !b) continue;
      const ln = document.createElementNS(SVG_NS, "line");
      ln.setAttribute("x1", a.x); ln.setAttribute("y1", a.y);
      ln.setAttribute("x2", b.x); ln.setAttribute("y2", b.y);
      ln.setAttribute("stroke", "#1a1a1a");
      ln.setAttribute("stroke-width", "1.4");
      ln.setAttribute("stroke-opacity", "0.55");
      ln.setAttribute("data-composed", "bridge");
      layer.appendChild(ln);
    }
    // Vertices: shape per type, colour per type
    this.composedSections.forEach((s, i) => {
      const t = SECTION_TYPES[s.type] || SECTION_TYPES.persona;
      const selected = i === this.composeSelectedIdx;
      const r = selected ? 14 : 11;
      const shape = this._makeShapeEl(t.shape, s.x, s.y, r, t.color, selected);
      shape.setAttribute("data-composed", "vertex");
      layer.appendChild(shape);
      // Glyph at the centre of the shape (Unicode mark)
      const g = document.createElementNS(SVG_NS, "text");
      g.setAttribute("x", s.x);
      g.setAttribute("y", s.y + 5);
      g.setAttribute("text-anchor", "middle");
      g.setAttribute("font-size", "13");
      g.setAttribute("fill", "#fff");
      g.setAttribute("data-composed", "glyph");
      g.textContent = t.glyph;
      layer.appendChild(g);
      // Outer label = type word (single short word)
      const labelR = R.VERTEX + 36;
      const lx = CX + labelR * Math.cos(s.angle);
      const ly = CY + labelR * Math.sin(s.angle);
      let rot = (s.angle * 180) / Math.PI + 90;
      if (rot > 90 && rot < 270) rot -= 180;
      const lab = document.createElementNS(SVG_NS, "text");
      lab.setAttribute("x", lx);
      lab.setAttribute("y", ly);
      lab.setAttribute("text-anchor", "middle");
      lab.setAttribute("font-family", "ui-monospace, Menlo, Consolas, monospace");
      lab.setAttribute("font-size", "11");
      lab.setAttribute("fill", t.color);
      lab.setAttribute("transform", `rotate(${rot} ${lx} ${ly})`);
      lab.setAttribute("data-composed", "label");
      lab.textContent = `${t.label} · ${t.presets[s.presetIndex].name}`;
      layer.appendChild(lab);
    });
  }

  _makeShapeEl(shape, cx, cy, r, color, selected) {
    const stroke = selected ? "hsl(45 90% 50%)" : "#1a1a1a";
    const sw = selected ? 3 : 1.2;
    const points = (n, rot = 0) => {
      const ps = [];
      for (let k = 0; k < n; k++) {
        const a = rot + (k * 2 * Math.PI) / n;
        ps.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
      }
      return ps.map((p) => p.join(",")).join(" ");
    };
    const star = () => {
      const ps = [];
      for (let k = 0; k < 10; k++) {
        const rad = k % 2 === 0 ? r : r * 0.45;
        const a = -Math.PI / 2 + (k * Math.PI) / 5;
        ps.push([cx + rad * Math.cos(a), cy + rad * Math.sin(a)]);
      }
      return ps.map((p) => p.join(",")).join(" ");
    };
    let el;
    switch (shape) {
      case "tri":
        el = document.createElementNS(SVG_NS, "polygon");
        el.setAttribute("points", points(3, -Math.PI / 2));
        break;
      case "tri-down":
        el = document.createElementNS(SVG_NS, "polygon");
        el.setAttribute("points", points(3, Math.PI / 2));
        break;
      case "square":
        el = document.createElementNS(SVG_NS, "polygon");
        el.setAttribute("points", points(4, Math.PI / 4));
        break;
      case "diamond":
        el = document.createElementNS(SVG_NS, "polygon");
        el.setAttribute("points", points(4, 0));
        break;
      case "star":
        el = document.createElementNS(SVG_NS, "polygon");
        el.setAttribute("points", star());
        break;
      case "hex":
        el = document.createElementNS(SVG_NS, "polygon");
        el.setAttribute("points", points(6, 0));
        break;
      case "ring":
        el = document.createElementNS(SVG_NS, "circle");
        el.setAttribute("cx", cx);
        el.setAttribute("cy", cy);
        el.setAttribute("r", r);
        el.setAttribute("fill", "none");
        el.setAttribute("stroke", color);
        el.setAttribute("stroke-width", "3");
        return el;
      case "disc":
      default:
        el = document.createElementNS(SVG_NS, "circle");
        el.setAttribute("cx", cx);
        el.setAttribute("cy", cy);
        el.setAttribute("r", r);
        break;
    }
    el.setAttribute("fill", color);
    el.setAttribute("stroke", stroke);
    el.setAttribute("stroke-width", sw);
    return el;
  }

  toggleMode() {
    this.drawing = !this.drawing;
    document.body.classList.toggle("drawing", this.drawing);
    this.toggleBtn.classList.toggle("active", this.drawing);
    this.toggleBtn.textContent = this.drawing ? "✓ done drawing" : "✎ draw";
    if (this.sigil.rotationGroup) {
      // Pause while drawing so screen coords == logical coords (and you can
      // hit a moving target accurately).
      this.sigil.rotationGroup.style.animationPlayState =
        this.drawing ? "paused" : "running";
    }
    if (!this.drawing) this.updateHint();
  }

  clear() {
    this.strokes = [];
    this.composedSections = [];
    this.composedBridges = [];
    this.composeSelectedIdx = null;
    if (this.sigil.layers && this.sigil.layers.userStrokes) {
      const l = this.sigil.layers.userStrokes;
      while (l.firstChild) l.removeChild(l.firstChild);
    }
    document.querySelectorAll(".affected-vertex").forEach((el) => {
      el.classList.remove("affected-vertex");
    });
    this.updateHint();
  }

  showHelp() {
    this.hintEl.innerHTML =
      "<b>vocabulary</b>: " +
      "<b>◯</b> enclose section = emphasize · " +
      "<b>─</b> line through 2+ sections = bridge · " +
      "<b>╳</b> two crossing strokes on a section = suppress · " +
      "<b>•</b> short mark near a section = reference";
  }

  toLocal(e) {
    const rect = this.sigil.svg.getBoundingClientRect();
    return [
      ((e.clientX - rect.left) / rect.width) * SVG_SIZE,
      ((e.clientY - rect.top) / rect.height) * SVG_SIZE,
    ];
  }

  onDown(e) {
    // Compose-mode click takes precedence over freehand draw.
    if (this.composeMode && this.composeMode !== "off") {
      e.preventDefault();
      const [x, y] = this.toLocal(e);
      this.handleComposeClick(x, y);
      return;
    }
    if (!this.drawing) return;
    e.preventDefault();
    this.sigil.svg.setPointerCapture(e.pointerId);
    const [x, y] = this.toLocal(e);
    this.current = { points: [[x, y]] };
    const p = document.createElementNS(SVG_NS, "path");
    p.setAttribute("fill", "none");
    p.setAttribute("stroke", "#1a1a1a");
    p.setAttribute("stroke-width", "3.5");
    p.setAttribute("stroke-linecap", "round");
    p.setAttribute("stroke-linejoin", "round");
    p.setAttribute("stroke-opacity", "0.85");
    p.setAttribute("d", `M ${x.toFixed(1)} ${y.toFixed(1)}`);
    this.sigil.layers.userStrokes.appendChild(p);
    this.currentPathEl = p;
  }

  onMove(e) {
    if (!this.drawing || !this.current) return;
    const [x, y] = this.toLocal(e);
    const last = this.current.points[this.current.points.length - 1];
    if (Math.hypot(x - last[0], y - last[1]) < 4) return;
    this.current.points.push([x, y]);
    const d = this.currentPathEl.getAttribute("d") + ` L ${x.toFixed(1)} ${y.toFixed(1)}`;
    this.currentPathEl.setAttribute("d", d);
  }

  onUp(e) {
    if (!this.current) return;
    if (this.current.points.length >= 2) {
      this.strokes.push(this.current);
      this.updateHint();
    } else if (this.currentPathEl) {
      this.currentPathEl.remove();
    }
    this.current = null;
    this.currentPathEl = null;
  }

  // -- classification -------------------------------------------------------
  classifyAll() {
    return this.strokes.map((s) => this.classifyOne(s));
  }

  classifyOne(stroke) {
    const pts = stroke.points;
    if (pts.length < 2) return { type: "noise", sections: [], closed: false };

    const xs = pts.map((p) => p[0]);
    const ys = pts.map((p) => p[1]);
    const w = Math.max(...xs) - Math.min(...xs);
    const h = Math.max(...ys) - Math.min(...ys);
    const diag = Math.hypot(w, h);

    let pathLen = 0;
    for (let i = 1; i < pts.length; i++) {
      pathLen += Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]);
    }
    const seDist = Math.hypot(
      pts[0][0] - pts[pts.length - 1][0],
      pts[0][1] - pts[pts.length - 1][1]
    );
    const closed = diag > 30 && seDist < diag * 0.35 && pathLen > diag * 1.7;

    const sections = (this.sigil.layout && this.sigil.layout.sections) || [];
    const affected = [];
    for (let i = 0; i < sections.length; i++) {
      const sec = sections[i];
      const sx = sec.vx, sy = sec.vy;
      if (closed) {
        if (this.pointInPolygon([sx, sy], pts)) affected.push(i);
      } else {
        const d = this.distToPath([sx, sy], pts);
        if (d < 50) affected.push(i);
      }
    }

    let type;
    if (closed) type = affected.length > 0 ? "enclose" : "free-shape";
    else if (affected.length >= 2) type = "connect";
    else if (affected.length === 1) type = "mark";
    else type = "stroke";
    return { type, sections: affected, closed, points: pts.length };
  }

  // Detect cross marks: two distinct strokes that intersect within a small
  // radius of a section vertex → suppress that section.
  findCrossSuppressions(annotations) {
    const sections = this.sigil.layout.sections;
    const suppressions = new Set();
    for (let i = 0; i < this.strokes.length; i++) {
      for (let j = i + 1; j < this.strokes.length; j++) {
        const ip = this.intersectStrokes(this.strokes[i], this.strokes[j]);
        if (!ip) continue;
        for (let s = 0; s < sections.length; s++) {
          const sec = sections[s];
          if (Math.hypot(sec.vx - ip[0], sec.vy - ip[1]) < 60) {
            suppressions.add(s);
          }
        }
      }
    }
    return suppressions;
  }

  intersectStrokes(a, b) {
    // Coarse test: do bounding boxes overlap and any segment-pair intersect?
    for (let i = 1; i < a.points.length; i++) {
      const A = a.points[i - 1], B = a.points[i];
      for (let j = 1; j < b.points.length; j++) {
        const C = b.points[j - 1], D = b.points[j];
        const ip = this.segIntersect(A, B, C, D);
        if (ip) return ip;
      }
    }
    return null;
  }
  segIntersect([x1, y1], [x2, y2], [x3, y3], [x4, y4]) {
    const d = (x2 - x1) * (y4 - y3) - (y2 - y1) * (x4 - x3);
    if (Math.abs(d) < 1e-9) return null;
    const t = ((x3 - x1) * (y4 - y3) - (y3 - y1) * (x4 - x3)) / d;
    const u = ((x3 - x1) * (y2 - y1) - (y3 - y1) * (x2 - x1)) / d;
    if (t < 0 || t > 1 || u < 0 || u > 1) return null;
    return [x1 + t * (x2 - x1), y1 + t * (y2 - y1)];
  }

  pointInPolygon([x, y], polygon) {
    let inside = false;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
      const [xi, yi] = polygon[i];
      const [xj, yj] = polygon[j];
      if ((yi > y) !== (yj > y) &&
          x < ((xj - xi) * (y - yi)) / ((yj - yi) || 1e-9) + xi) {
        inside = !inside;
      }
    }
    return inside;
  }
  distToPath([x, y], pts) {
    let m = Infinity;
    for (let i = 1; i < pts.length; i++) {
      const d = this.distSeg([x, y], pts[i - 1], pts[i]);
      if (d < m) m = d;
    }
    return m;
  }
  distSeg([px, py], [x1, y1], [x2, y2]) {
    const dx = x2 - x1, dy = y2 - y1;
    const L = dx * dx + dy * dy;
    if (L === 0) return Math.hypot(px - x1, py - y1);
    let t = ((px - x1) * dx + (py - y1) * dy) / L;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
  }

  // Build a structured interpretation: { emphasize: Set<idx>, suppress, bridge }
  interpret() {
    const annotations = this.classifyAll();
    const emphasize = new Set();
    const suppress = this.findCrossSuppressions(annotations);
    const bridges = [];
    for (const a of annotations) {
      if (a.type === "enclose" || a.type === "mark") {
        for (const s of a.sections) {
          if (!suppress.has(s)) emphasize.add(s);
        }
      } else if (a.type === "connect") {
        bridges.push(a.sections);
        for (const s of a.sections) {
          if (!suppress.has(s)) emphasize.add(s);
        }
      }
    }
    // Cross marks override emphasis
    for (const s of suppress) emphasize.delete(s);
    return { emphasize, suppress, bridges, annotations };
  }

  // --- UI feedback --------------------------------------------------------
  updateHint() {
    if (!this.sigil.layout || this.strokes.length === 0) {
      this.hintEl.textContent = "";
      this.markAffected(new Set(), new Set());
      return;
    }
    const r = this.interpret();
    const sections = this.sigil.layout.sections;
    const name = (i) => sections[i] ? sections[i].heading : `#${i}`;
    const parts = [];
    if (r.emphasize.size > 0) {
      parts.push(`<b>emphasize</b>: ${[...r.emphasize].map(name).join(", ")}`);
    }
    if (r.suppress.size > 0) {
      parts.push(`<b>suppress</b>: ${[...r.suppress].map(name).join(", ")}`);
    }
    if (r.bridges.length > 0) {
      parts.push(
        `<b>bridges</b>: ${r.bridges.map((b) => b.map(name).join("↔")).join(", ")}`
      );
    }
    if (parts.length === 0) {
      this.hintEl.innerHTML =
        `<span class="mute">${this.strokes.length} stroke(s); no recognized targets — try drawing closer to a section vertex</span>`;
    } else {
      this.hintEl.innerHTML = parts.join(" · ");
    }
    this.markAffected(r.emphasize, r.suppress);
  }

  markAffected(emphasize, suppress) {
    if (!this.sigil.sectionVertexEls) return;
    this.sigil.sectionVertexEls.forEach((el, i) => {
      if (!el) return;
      el.classList.remove("affected-vertex");
      if (emphasize.has(i) || suppress.has(i)) {
        el.classList.add("affected-vertex");
      }
    });
  }

  // ===== Compose: build a prompt skeleton from drawn strokes =================
  // Each closed stroke becomes one h1 section. Position around the rim
  // determines order (clockwise from top). Names are auto-numbered; the user
  // edits them after the textarea is populated.
  blankCanvas() {
    const sigil = this.sigil;
    sigil.input.value = "";
    sigil._lastPreparedText = null;
    sigil.layout = null;
    // Ensure the SVG structure exists (layers, rotation group, etc.) so the
    // user can draw immediately even before any conjure has happened.
    sigil.resetSvg();
    if (sigil.layers) {
      for (const [k, el] of Object.entries(sigil.layers)) {
        if (k === "thinkingRings") continue;
        while (el.firstChild) el.removeChild(el.firstChild);
      }
    }
    sigil.sectionVertexEls = [];
    // Add a minimal frame so the canvas isn't completely empty.
    const layers = sigil.layers;
    const mk = (tag, attrs, parent) => {
      const e = document.createElementNS(SVG_NS, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      parent.appendChild(e);
      return e;
    };
    mk("circle", { cx: CX, cy: CY, r: R.BOUND_OUT, fill: "none", stroke: INK, "stroke-width": 1.6, "stroke-opacity": 0.85 }, layers.boundary);
    mk("circle", { cx: CX, cy: CY, r: R.BOUND_IN, fill: "none", stroke: INK, "stroke-width": 0.8, "stroke-opacity": 0.6 }, layers.boundary);
    mk("circle", { cx: CX, cy: CY, r: R.SEAL_OUT, fill: BG, stroke: INK, "stroke-width": 0.9, "stroke-opacity": 0.8 }, layers.seal);
    mk("circle", { cx: CX, cy: CY, r: R.SEAL_IN, fill: "none", stroke: INK, "stroke-width": 0.5, "stroke-opacity": 0.45 }, layers.seal);
    const t = mk("text", {
      x: CX, y: CY + 5, "text-anchor": "middle",
      "font-family": "ui-monospace, Menlo, Consolas, monospace",
      "font-size": "10", fill: "#888",
    }, layers.centre);
    t.textContent = "blank";

    this.strokes = [];
    this.composedSections = [];
    this.composedBridges = [];
    this.composeSelectedIdx = null;
    document.getElementById("stats").innerHTML =
      '<span class="mute">blank canvas — pick a glyph (◉ △ ⊞ ◇ ✦ ▽ ○ ⌬) and click on the figure</span>';
    this.hintEl.innerHTML =
      '<span class="mute">click <b>◉</b> persona, then click on the figure to place. click an existing vertex to cycle preset.</span>';
    this.setComposeMode("place:persona");
  }

  scaffoldPrompt() {
    // Combine typed-click sections (preferred) with freehand closed strokes
    // (legacy fallback for free-form input).
    const items = [];
    this.composedSections.forEach((s, idx) => {
      const t = SECTION_TYPES[s.type] || SECTION_TYPES.persona;
      const preset = t.presets[s.presetIndex];
      const myBridges = this.composedBridges
        .filter((b) => b.a === idx || b.b === idx)
        .map((b) => {
          const other = this.composedSections[b.a === idx ? b.b : b.a];
          const ot = SECTION_TYPES[other.type] || SECTION_TYPES.persona;
          return `${ot.label} (${ot.presets[other.presetIndex].name})`;
        });
      // Capitalise the type label for the heading: "persona" → "Persona"
      const heading =
        t.label.charAt(0).toUpperCase() + t.label.slice(1) +
        " — " + preset.name;
      items.push({
        angle: s.angle,
        heading,
        body: preset.body,
        bridges: myBridges,
      });
    });
    // Freehand closed strokes -> generic placeholder section
    const closed = this.strokes
      .map((s) => ({ s, c: this.classifyOne(s) }))
      .filter((x) => x.c.closed);
    closed.forEach(({ s }) => {
      const cx = s.points.reduce((a, p) => a + p[0], 0) / s.points.length;
      const cy = s.points.reduce((a, p) => a + p[1], 0) / s.points.length;
      const angle = Math.atan2(cy - 800, cx - 800);
      items.push({
        angle,
        heading: `Section ${items.length + 1}`,
        body: "(placeholder — describe this section)",
        bridges: [],
      });
    });

    if (items.length === 0) {
      this.hintEl.innerHTML =
        '<span style="color:#a33">place at least one typed section (◉ △ ⊞ …) or draw a closed shape</span>';
      return;
    }

    items.forEach((it) => {
      it.sortKey = (it.angle - (-Math.PI / 2) + 2 * Math.PI) % (2 * Math.PI);
    });
    items.sort((a, b) => a.sortKey - b.sortKey);

    const lines = [];
    items.forEach((it) => {
      lines.push(`# ${it.heading}`);
      lines.push("");
      lines.push(it.body);
      if (it.bridges.length > 0) {
        lines.push("");
        lines.push(`Related: ${it.bridges.join("; ")}.`);
      }
      lines.push("");
    });
    this.sigil.input.value = lines.join("\n");
    this.hintEl.innerHTML =
      `<b>scaffolded ${items.length} section(s)</b> — click <i>conjure</i> to render the real sigil`;
    if (this.drawing) this.toggleMode();
    if (this.composeMode !== "off") this.setComposeMode("off");
  }

  // Build the textual annotation appended to the user query.
  toQueryAnnotation() {
    if (!this.sigil.layout || this.strokes.length === 0) return "";
    const r = this.interpret();
    const sections = this.sigil.layout.sections;
    const nm = (i) => (sections[i] ? sections[i].heading : `section ${i}`);
    const parts = [];
    if (r.emphasize.size > 0) {
      parts.push(`focus on: ${[...r.emphasize].map(nm).join(", ")}`);
    }
    if (r.suppress.size > 0) {
      parts.push(`avoid: ${[...r.suppress].map(nm).join(", ")}`);
    }
    if (r.bridges.length > 0) {
      parts.push(
        `combine: ${r.bridges.map((b) => b.map(nm).join(" with ")).join("; ")}`
      );
    }
    return parts.length > 0 ? `\n\n[user-drawn intent: ${parts.join("; ")}]` : "";
  }
}

const sigilApp = new Sigil();
const llmApp = new LLM(sigilApp);
const sketcher = new Sketcher(sigilApp);
window.sigil = sigilApp;
window.llm = llmApp;
window.sketcher = sketcher;
</script>
</body>
</html>
